name: Android CI – Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Download gradle-wrapper.jar ─────────────────────────────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # ── 4. Remove invalid files from drawable folders ──────────────────────
      - name: Remove invalid files from drawable folders
        run: |
          find app/src/main/res/drawable* -type f \
            ! -name "*.png" ! -name "*.jpg" ! -name "*.jpeg" \
            ! -name "*.webp" ! -name "*.gif" ! -name "*.xml" \
            -exec echo "Removing: {}" \; -exec rm {} \;

      # ── 5. Fix drawable filenames (hyphens → underscores) ──────────────────
      - name: Rename drawable files (replace hyphens with underscores)
        run: |
          for f in $(find app/src/main/res/drawable* -type f -name "*-*"); do
            newname=$(echo "$f" | tr '-' '_')
            [ "$f" != "$newname" ] && mv "$f" "$newname" && echo "Renamed: $f -> $newname"
          done

      # ── 6. Fix Java/XML source references to match renamed drawables ────────
      - name: Update source references to match renamed drawables
        run: |
          find app/src/main/java app/src/main/res -type f \( -name "*.java" -o -name "*.xml" \) | \
          while read file; do
            sed -i 's/yellowbird-downflap/yellowbird_downflap/g;
                    s/yellowbird-midflap/yellowbird_midflap/g;
                    s/yellowbird-upflap/yellowbird_upflap/g;
                    s/redbird-downflap/redbird_downflap/g;
                    s/redbird-midflap/redbird_midflap/g;
                    s/redbird-upflap/redbird_upflap/g;
                    s/bluebird-downflap/bluebird_downflap/g;
                    s/bluebird-midflap/bluebird_midflap/g;
                    s/bluebird-upflap/bluebird_upflap/g;
                    s/pipe-green/pipe_green/g' "$file"
          done

      # ── 7. Fix Material3 Expressive theme references ────────────────────────
      - name: Replace Material3Expressive themes with stable Material3 themes
        run: |
          find app/src/main/res -type f -name "*.xml" | while read file; do
            sed -i \
              's/Theme\.Material3Expressive\.DayNight\.NoActionBar/Theme.Material3.DayNight.NoActionBar/g;
               s/Theme\.Material3Expressive\.DayNight/Theme.Material3.DayNight/g;
               s/Theme\.Material3Expressive\./Theme.Material3./g;
               s/ThemeOverlay\.Material3Expressive\./ThemeOverlay.Material3./g;
               s/ThemeOverlay\.Material3Expressive/ThemeOverlay.Material3/g' "$file"
          done
          echo "Theme references patched."

      # ── 8. Disable ViewBinding for settings.xml (too-many-parameters fix) ──
      # settings.xml has hundreds of views; generated SettingsBinding exceeds
      # Java's 255-parameter constructor limit.
      # Strategy: use Python to safely parse & patch the XML without
      # duplicating any namespace declarations.
      - name: Disable ViewBinding for settings.xml
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import re

          path = "app/src/main/res/layout/settings.xml"

          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          # Already patched? Skip.
          if 'viewBindingIgnore="true"' in content:
              print("Already patched, skipping.")
              exit(0)

          tools_ns = 'http://schemas.android.com/tools'
          tools_prefix = 'xmlns:tools="http://schemas.android.com/tools"'

          # Add tools namespace declaration if missing
          if tools_prefix not in content:
              # Insert after the first xmlns:android declaration
              content = re.sub(
                  r'(xmlns:android="http://schemas\.android\.com/apk/res/android")',
                  r'\1\n    xmlns:tools="http://schemas.android.com/tools"',
                  content, count=1
              )
              print("Added xmlns:tools namespace.")
          else:
              print("xmlns:tools already present, not adding again.")

          # Now inject tools:viewBindingIgnore="true" into the root element's
          # opening tag (after the last attribute before the closing > or />)
          # We do this by inserting before the first > that closes the root tag.
          # The root tag spans multiple lines; find where its attribute list ends.
          content = re.sub(
              r'(xmlns:tools="http://schemas\.android\.com/tools")',
              r'\1\n    tools:viewBindingIgnore="true"',
              content, count=1
          )
          print("Injected tools:viewBindingIgnore='true'.")

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)

          print("Done patching settings.xml.")
          EOF

      # ── 9. Make gradlew executable ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 10. Cache Gradle dependencies ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 11. Build DEBUG APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 12. Upload Debug APK ───────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 13. Build RELEASE APK (unsigned) ───────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ── 14. Upload Release APK ─────────────────────────────────────────────
      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird-Release-APK-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
