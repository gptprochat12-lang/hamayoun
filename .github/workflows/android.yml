name: Android CI – Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by AGP 8.7) ───────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Download gradle-wrapper.jar ─────────────────────────────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # ── 4. Fix drawable filenames (hyphens → underscores) ──────────────────
      # Android resource names only allow a-z, 0-9, and underscore.
      # Files like yellowbird-midflap.png must become yellowbird_midflap.png.
      - name: Rename drawable files (replace hyphens with underscores)
        run: |
          DRAWABLE_DIR="app/src/main/res/drawable"
          for f in "$DRAWABLE_DIR"/*-*.png "$DRAWABLE_DIR"/*-*.xml "$DRAWABLE_DIR"/*-*.jpg; do
            [ -e "$f" ] || continue
            newname=$(echo "$f" | tr '-' '_')
            mv "$f" "$newname"
            echo "Renamed: $f -> $newname"
          done
          for dir in app/src/main/res/drawable-*/; do
            for f in "$dir"*-*; do
              [ -e "$f" ] || continue
              newname=$(echo "$f" | tr '-' '_')
              [ "$f" != "$newname" ] && mv "$f" "$newname" && echo "Renamed: $f -> $newname"
            done
          done

      # ── 5. Fix Java/XML source references to match renamed drawables ────────
      - name: Update source references to match renamed drawables
        run: |
          find app/src/main/java app/src/main/res -type f \( -name "*.java" -o -name "*.xml" \) | \
          while read file; do
            sed -i 's/yellowbird-downflap/yellowbird_downflap/g;
                    s/yellowbird-midflap/yellowbird_midflap/g;
                    s/yellowbird-upflap/yellowbird_upflap/g;
                    s/redbird-downflap/redbird_downflap/g;
                    s/redbird-midflap/redbird_midflap/g;
                    s/redbird-upflap/redbird_upflap/g;
                    s/bluebird-downflap/bluebird_downflap/g;
                    s/bluebird-midflap/bluebird_midflap/g;
                    s/bluebird-upflap/bluebird_upflap/g;
                    s/pipe-green/pipe_green/g' "$file"
          done

      # ── 6. Make gradlew executable ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 7. Cache Gradle dependencies ───────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 8. Build DEBUG APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 9. Upload Debug APK ────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 10. Build RELEASE APK (unsigned) ───────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ── 11. Upload Release APK ─────────────────────────────────────────────
      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird-Release-APK-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
